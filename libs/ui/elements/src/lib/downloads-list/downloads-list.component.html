<div
  class="flex flex-wrap justify-between mt-8 mb-6 sm:mt-12 sm:mb-2 items-center pb4"
  *ngIf="links && links.length > 0"
>
  <div class="flex flex-row items-center gap-x-4">
    <p
      class="font-title text-[28px] text-title font-medium mr-4 text-center sm:text-left"
      translate
    >
      record.metadata.download
    </p>
    <gn-ui-previous-next-buttons
      *ngIf="paginableElement?.pagesCount > 1"
      [listComponent]="paginableElement"
    ></gn-ui-previous-next-buttons>
  </div>

  <div
    class="flex flex-wrap justify-start sm:justify-end"
    data-cy="download-format-filters"
  >
    <gn-ui-button
      class="m-1 format-filter"
      [extraClass]="
        '!px-[12px] !py-[8px] !text-[15px]' +
        (isFilterActive(format) ? ' opacity-100' : ' opacity-50')
      "
      (buttonClick)="toggleFilterFormat(format)"
      [attr.data-format]="format"
      *ngFor="let format of visibleFormats"
    >
      {{ getFilterFormatTitle(format) }}
    </gn-ui-button>
  </div>
</div>

<ng-container>
  <gn-ui-block-list containerClass="gap-4 py-10">
    <gn-ui-download-item
      #block
      *ngFor="let link of filteredLinks"
      [link]="link"
      [color]="getLinkColor(link)"
      [format]="getLinkFormat(link)"
      [isFromApi]="isFromApi(link)"
    ></gn-ui-download-item>
  </gn-ui-block-list>
</ng-container>
