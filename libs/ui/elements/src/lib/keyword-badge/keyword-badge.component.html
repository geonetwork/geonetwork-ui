<ng-template #keywordTooltip>
  @for (segment of segments; track $index) {
    <span [class.font-bold]="$last">{{ segment }}</span>
    @if (!$last) {
      <span> &gt; </span>
    }
  }
</ng-template>
<gn-ui-popover [content]="keywordTooltip">
  <gn-ui-badge
    [clickable]="!editMode"
    [removable]="editMode"
    (badgeClicked)="keywordClick.emit(keyword)"
    (badgeRemoveClicked)="remove.emit(keyword)"
    ><ng-container>{{ keyword.label }}</ng-container>
    @if (editMode && isPlaceWithoutExtent) {
      <ng-icon
        [title]="'editor.record.form.keywords.place.withoutExtent' | translate"
        class="!text-[1.4em] ml-1"
        name="matWarningAmberOutline"
      ></ng-icon>
    }
  </gn-ui-badge>
</gn-ui-popover>
