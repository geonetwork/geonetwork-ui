<div
  cdkDropList
  class="sortable-list flex flex-col gap-3 p-2"
  (cdkDropListDropped)="drop($event)"
>
  @for (item of items; track trackByFn(index); let index = $index) {
    <div class="sortable-box bg-white flex items-center" cdkDrag>
      <ng-icon
        cdkDragHandle
        name="matDragHandleOutline"
        size="20"
        class="mx-[10px] cursor-grab flex-none"
      ></ng-icon>
      <div class="flex-1">
        <ng-container
          *ngTemplateOutlet="
            elementTemplate;
            context: { $implicit: item, index }
          "
        ></ng-container>
      </div>
      <gn-ui-button
        type="light"
        style="
          --gn-ui-button-padding: 0px;
          --gn-ui-button-width: 24px;
          --gn-ui-button-height: 24px;
        "
        class="ml-[8px] mr-[10px]"
        (buttonClick)="removeItem(index)"
        data-test="remove-item"
        ><ng-icon name="matCloseOutline" size="20"></ng-icon
      ></gn-ui-button>
    </div>
  }
</div>
