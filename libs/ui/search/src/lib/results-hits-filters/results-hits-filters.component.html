<ul class="flex list-none gap-2">
  <li *ngFor="let choice of choices" [title]="choice.label">
    <label
      class="flex items-center gap-2 text-black rounded-md border border-gray-400 py-1 px-2 cursor-pointer hover:bg-primary-lightest focus-within:text-primary-darkest focus-within:bg-gray-50 transition-colors"
    >
      <input
        class="hidden"
        type="checkbox"
        #checkBox
        [checked]="isSelected(choice)"
        (change)="select(choice, checkBox.checked)"
      />
      <ng-icon [name]="choice.icon"></ng-icon>
      {{ choice.label }}
    </label>
  </li>
</ul>
