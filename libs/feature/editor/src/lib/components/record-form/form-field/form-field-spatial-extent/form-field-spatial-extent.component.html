<div class="flex flex-col gap-3">
  <gn-ui-form-field-keywords-generic
    [placeholder]="'Search for place keywords'"
    [keywords]="placeKeywords"
    [keywordTypes]="['place']"
    (changedKeywords)="handlePlaceKeywordsChange($event)"
  >
  </gn-ui-form-field-keywords-generic>
</div>
<div class="w-full h-96">
  <gn-ui-form-field-map-container
    [keywordsWithSpatialExtents]="keywordsLinkedToExtents"
  ></gn-ui-form-field-map-container>
</div>
