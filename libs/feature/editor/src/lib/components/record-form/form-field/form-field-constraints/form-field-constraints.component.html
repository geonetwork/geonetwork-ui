<div class="w-full mt-8" *ngIf="true" data-test="displayedConstraints">
  <gn-ui-sortable-list
    [items]="value"
    (itemsOrderChange)="handleConstraintsOrderChange($event)"
    [elementTemplate]="constraintTemplate"
  ></gn-ui-sortable-list>
  <ng-template #constraintTemplate let-constraint>
    <gn-ui-constraint-card
      [constraintText]="constraint.text"
    ></gn-ui-constraint-card>
  </ng-template>
</div>
