<gn-search-input
  api-url="https://www.geo2france.fr/geonetwork/srv/api"
  open-on-select="https://www.geo2france.fr/datahub/dataset/${uuid}"
></gn-search-input>

<gn-results-list
  size="10"
  api-url="https://www.geo2france.fr/geonetwork/srv/api"
  catalog-url="https://www.geo2france.fr/datahub/dataset/{uuid}"
  layout="ROW"
  primary-color="#251"
  secondary-color="#c40"
  main-color="#555"
  background-color="#fdfbff"
  main-font="'Inter', sans-serif"
  title-font="'DM Serif Display', serif"
  show-more="auto"
  filter='{"OrgForResourceObject.default": { "Géo2France": true } }'
></gn-results-list>
