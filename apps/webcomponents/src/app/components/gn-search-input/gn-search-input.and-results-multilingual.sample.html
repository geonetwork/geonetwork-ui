<gn-search-input
  api-url="https://www.geocat.ch/geonetwork/srv/api"
  open-on-select="https://www.geocat.ch/datahub/dataset/${uuid}"
  metadata-language="current"
  text-language="de"
></gn-search-input>

<gn-results-list
  size="10"
  api-url="https://www.geocat.ch/geonetwork/srv/api"

  text-language="de"
  layout="ROW"
  primary-color="#251"
  secondary-color="#c40"
  main-color="#555"

  title-font="'DM Serif Display', serif"
