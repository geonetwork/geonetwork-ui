<ng-container *ngTemplateOutlet="navBar"></ng-container>
<ng-template #navBar>
  <nav
    class="block w-full text-xs text-black bg-primary-white shadow-[0px_0px_5.1px_0px] shadow-primary-darkest"
  >
    <div
      class="h-full container-lg mx-auto flex justify-between overflow-hidden"
      [class]="
        displayMobileNavBar
          ? 'items-start'
          : 'items-center divide-x-2 divide-gray-300'
      "
    >
      <div
        class="h-[60px] flex min-w-[60px] items-center justify-center lg:justify-end lg:pr-4 text-sm"
        [class]="displayMobileNavBar ? 'border-r-2 border-gray-300' : ''"
      >
        <gn-ui-button
          data-cy="backButton"
          [style.--gn-ui-button-rounded]="'8px'"
          [style.--gn-ui-button-height]="'32px'"
          [style.--gn-ui-button-width]="'40px'"
          [style.--gn-ui-button-color]="'black'"
          [style.--gn-ui-button-background]="'var(--color-primary-white)'"
          [style.--gn-ui-button-bg-hover]="'var(--color-primary-lightest)'"
          [style.--gn-ui-button-padding]="'4px'"
          (buttonClick)="back()"
          type="outline"
        >
          <ng-icon name="matArrowBack"></ng-icon>
        </gn-ui-button>
      </div>
      <button
        type="button"
        *ngFor="let l of anchorLinks"
        [attr.data-cy]="l.anchor"
        gnUiAnchorLink="{{ l.anchor }}"
        gnUiAnchorLinkDisabledClass="sm:hidden"
        gnUiAnchorLinkInViewClass="!border-b-primary border-b-4 pb-0"
        gnUiAnchorLinkOutOfViewClass="pb-1"
        class="font-medium hidden sm:block hover:bg-primary-lightest h-[60px] w-full px-2 items-center text-left"
        translate
      >
        {{ l.label }}
      </button>
      <div
        (click)="toggleMobileNavBar()"
        class="w-full flex justify-start items-start cursor-pointer sm:hidden"
      >
        <button
          data-cy="navbar-mobile-toggle"
          type="button"
          class="h-[60px] inline-flex items-center justify-center p-2 rounded-md shrink-0 sm:hidden"
        >
          <ng-icon name="iconoirMenu" size="24px"></ng-icon>
        </button>
        <div
          class="shrink truncate"
          [class]="displayMobileNavBar ? 'block' : 'hidden'"
        >
          <div *ngFor="let l of anchorLinks">
            <button
              attr.data-cy="{{ l.anchor }}-mobile-menu"
              gnUiAnchorLink="{{ l.anchor }}"
              gnUiAnchorLinkDisabledClass="hidden"
              class="h-[60px] block px-3 py-3 hover:bg-primary-lightest font-medium w-full text-left text-wrap"
              translate
            >
              {{ l.label }}
            </button>
          </div>
        </div>
        <div
          class="h-[60px]"
          [class]="displayMobileNavBar ? 'hidden' : 'block'"
        >
          <div *ngFor="let l of anchorLinks">
            <button
              attr.data-cy="{{ l.anchor }}-mobile-title"
              gnUiAnchorLink="{{ l.anchor }}"
              gnUiAnchorLinkDisabledClass="hidden"
              gnUiAnchorLinkInViewClass="block"
              gnUiAnchorLinkOutOfViewClass="hidden"
              class="h-[60px] px-3 py-3 rounded-md font-medium shrink text-wrap text-left"
              translate
              (click)="$event.stopPropagation(); $event.preventDefault()"
              style="pointer-events: none"
            >
              {{ l.label }}
            </button>
          </div>
        </div>
      </div>
      <div
        class="h-[60px] flex flex-row gap-3 justify-center items-center px-4 lg:pl-4 lg:justify-end text-sm"
        [class]="displayMobileNavBar ? 'border-l-2 border-gray-300' : ''"
      >
        <gn-ui-favorite-star
          *ngIf="metadata?.uniqueIdentifier"
          [record]="metadata"
          [buttonType]="'outline'"
          [displayCount]="false"
          class="flex text-background content-center"
          [style.--gn-ui-button-rounded]="'8px'"
          [style.--gn-ui-button-height]="'32px'"
          [style.--gn-ui-button-width]="'40px'"
          [style.--gn-ui-button-color]="'black'"
          [style.--gn-ui-button-background]="'var(--color-primary-white)'"
          [style.--gn-ui-button-bg-hover]="'var(--color-primary-lightest)'"
          [style.--gn-ui-button-padding]="'4px'"
          [style.----star-toggle-enabled-color]="'black'"
          [style.----star-toggle-disabled-color]="'black'"
        ></gn-ui-favorite-star>
        <gn-ui-language-switcher
          *ngIf="showLanguageSwitcher"
          [style.--gn-ui-button-rounded]="'8px'"
          [style.--gn-ui-button-height]="'32px'"
          [style.--gn-ui-button-width]="'40px'"
          [style.--gn-ui-button-color]="'black'"
          [style.--gn-ui-button-background]="'var(--color-primary-white)'"
          [style.--gn-ui-button-bg-hover]="'var(--color-primary-lightest)'"
          [style.--gn-ui-button-padding]="'4px'"
        ></gn-ui-language-switcher>
      </div>
    </div>
  </nav>
</ng-template>
